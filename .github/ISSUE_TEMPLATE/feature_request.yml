name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature-request", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!
        The more context you give, the better we can prioritise it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the problem or frustration you're experiencing.
        A clear problem statement helps us understand the need.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature you'd like
      description: What would you like to happen? Be as specific as possible.
      placeholder: "I would like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workaround or alternative solution you've tried?
      placeholder: "I've tried..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Financial Statement (monthly view)
        - Tax Feature
        - Income & Spending
        - Reports & Projections
        - Data & Export
        - UI / Design
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - 🔥 Blocker — I can't use the app without it
        - 🙏 High — I really need this
        - 👍 Medium — Would be nice to have
        - 💡 Low — Just an idea
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        Screenshots, mockups, links, or any other context
        that could help us understand the request.
    validations:
      required: false
